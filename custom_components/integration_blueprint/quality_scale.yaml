rules:
  # Bronze
  action-setup:
    status: exempt
    comment: This integration does not register any service actions.
  appropriate-polling: done
  brands:
    status: todo
    comment: Local brand/ directory satisfies HACS; submission to home-assistant/brands is still pending.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not register any service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: todo
  entity-event-setup:
    status: exempt
    comment: No entity subscribes to external events; data flows through the coordinator.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: This integration does not register any service actions.
  config-entry-unloading: done
  docs-configuration-parameters: todo
  docs-installation-parameters: todo
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: todo
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Cloud service with no local discovery mechanism.
  discovery-update-info:
    status: exempt
    comment: Cloud service with no local discovery mechanism.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices:
    status: exempt
    comment: This integration talks to a service, not user-owned devices.
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: The integration models a single static service device.
  entity-category:
    status: exempt
    comment: The sole entity is a primary sensor; no non-primary entities exist.
  entity-device-class:
    status: exempt
    comment: The title sensor returns free-form text with no applicable device class.
  entity-disabled-by-default:
    status: exempt
    comment: All entities are primary and should be enabled on setup.
  entity-translations: done
  exception-translations: done
  icon-translations:
    status: exempt
    comment: The sensor uses a single static icon; no state-based icon mapping is needed.
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: exempt
    comment: The integration models a single static service device.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
