rules:
  # Bronze
  action-setup:
    status: exempt
    comment: This integration does not register any service actions.
  appropriate-polling: done
  brands:
    status: todo
    comment: Local brand/ directory satisfies HACS; submission to home-assistant/brands is still pending.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not register any service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: todo
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: This integration does not register any service actions.
  config-entry-unloading: done
  docs-configuration-parameters: todo
  docs-installation-parameters: todo
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Cloud service with no local discovery mechanism.
  discovery-update-info:
    status: exempt
    comment: Cloud service with no local discovery mechanism.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: done
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations:
    status: exempt
    comment: Static MDI icons per entity; no state-based icon mapping needed.
  reconfiguration-flow: done
  repair-issues: done
  stale-devices: done

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: SDK manages its own aiohttp session; no shared HA session to inject.
  strict-typing: done
